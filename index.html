<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNotes — Minimalist Feed Notes</title>
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d1117;
            --sidebar-bg: #161b22;
            --card-bg: #161b22;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --accent: #58a6ff;
            --accent-hover: #79b8ff;
            --accent-soft: rgba(88, 166, 255, 0.1);
            --border: #30363d;
            --heat-0: #21262d;
            --heat-1: #0e4429;
            --heat-2: #006d32;
            --heat-3: #26a641;
            --tag-bg: #21262d;
            --tag-text: #8b949e;
            --selection: rgba(88, 166, 255, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        aside {
            width: 280px;
            background-color: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            padding: 16px;
            overflow-y: auto;
            z-index: 10;
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.025em;
        }

        .logo span {
            color: var(--accent);
        }

        /* Calendar Activity Heatmap */
        .calendar-wrap {
            margin-bottom: 16px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .month-name {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .calendar-nav {
            display: flex;
            gap: 2px;
        }

        .calendar-nav button {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 1rem;
        }

        .calendar-nav button:hover {
            background-color: var(--tag-bg);
            color: var(--text-primary);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
        }

        .calendar-day-label {
            font-size: 0.65rem;
            text-align: center;
            color: var(--text-secondary);
            font-weight: 600;
            padding-bottom: 4px;
            text-transform: uppercase;
        }

        .day-cell {
            aspect-ratio: 1;
            border-radius: 3px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 500;
        }

        .day-cell:hover:not(.other-month) {
            outline: 1px solid var(--accent);
        }

        .day-cell.selected {
            outline: 2px solid var(--accent);
        }

        .day-cell.other-month {
            opacity: 0.1;
            cursor: default;
        }

        .day-cell.today {
            text-decoration: underline;
            font-weight: 700;
        }

        .heat-0 { background-color: var(--heat-0); color: var(--text-secondary); }
        .heat-1 { background-color: var(--heat-1); color: var(--text-primary); }
        .heat-2 { background-color: var(--heat-2); color: #fff; }
        .heat-3 { background-color: var(--heat-3); color: #fff; }

        /* Tags Section */
        .tags-section {
            margin-top: 8px;
        }

        .sidebar-section-title {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 10px;
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .tag-pill {
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 10px;
            background-color: var(--tag-bg);
            color: var(--tag-text);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 4px;
            border: none;
        }

        .tag-pill:hover {
            background-color: var(--border);
            color: var(--text-primary);
        }

        .tag-pill.active {
            background-color: var(--accent);
            color: #fff;
        }

        .tag-count {
            font-size: 0.65rem;
            opacity: 0.8;
        }

        /* Tag Folder Structure */
        .tag-folder {
            margin-bottom: 8px;
        }

        .tag-folder-name {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
            padding-left: 4px;
        }

        .tag-folder-children {
            padding-left: 8px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: var(--bg-color);
        }

        .top-bar {
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .filter-status {
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--accent-soft);
            padding: 4px 10px;
            border-radius: 6px;
            color: var(--accent);
            font-weight: 500;
        }

        .clear-btn {
            cursor: pointer;
            font-weight: 700;
            margin-left: 4px;
        }

        /* Editor Section */
        .editor-section {
            padding: 0 20px 12px;
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }

        .editor-card {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 12px;
            position: relative;
        }

        #editor {
            width: 100%;
            min-height: 100px;
            outline: none;
            font-size: 0.95rem;
            line-height: 1.5;
            color: var(--text-primary);
            background: transparent;
            border: none;
            resize: vertical;
            font-family: 'JetBrains Mono', monospace;
        }

        #editor::placeholder {
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .editor-footer {
            display: flex;
            justify-content: flex-end;
            gap: 8px;
            margin-top: 10px;
        }

        .btn-primary {
            background-color: var(--accent);
            color: #fff;
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
        }

        .btn-secondary {
            background-color: var(--tag-bg);
            color: var(--text-primary);
            border: none;
            padding: 6px 16px;
            border-radius: 6px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
        }

        .btn-secondary:hover {
            background-color: var(--border);
        }

        .edit-indicator {
            font-size: 0.75rem;
            color: var(--accent);
            margin-right: auto;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Tag Autocomplete */
        .tag-autocomplete {
            position: absolute;
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
            display: none;
            min-width: 200px;
        }

        .tag-autocomplete.active {
            display: block;
        }

        .autocomplete-item {
            padding: 6px 10px;
            cursor: pointer;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .autocomplete-item:hover,
        .autocomplete-item.selected {
            background-color: var(--accent-soft);
        }

        .autocomplete-folder {
            color: var(--text-secondary);
            font-size: 0.75rem;
        }

        .autocomplete-tag {
            color: var(--accent);
        }

        /* Feed Section */
        .feed-wrap {
            flex: 1;
            overflow-y: auto;
            padding: 0 20px 40px;
            scroll-behavior: smooth;
        }

        .feed-inner {
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
        }

        .note-item {
            background-color: var(--card-bg);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            position: relative;
            animation: slideUp 0.3s ease-out;
            cursor: pointer;
        }

        .note-item:hover {
            background-color: #1c2128;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .note-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .note-date {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            background-color: var(--tag-bg);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .note-actions {
            opacity: 0;
            transition: opacity 0.15s;
            display: flex;
            gap: 8px;
        }

        .note-item:hover .note-actions {
            opacity: 1;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 2px 6px;
            font-size: 0.8rem;
            border-radius: 4px;
        }

        .action-btn:hover {
            background-color: var(--tag-bg);
            color: var(--text-primary);
        }

        .action-btn.delete:hover {
            color: #f85149;
        }

        .note-body {
            line-height: 1.6;
            color: var(--text-primary);
        }

        /* Markdown in Body */
        .note-body h1 { font-size: 1.4rem; margin-bottom: 0.75rem; font-weight: 700; letter-spacing: -0.02em; }
        .note-body h2 { font-size: 1.2rem; margin-bottom: 0.6rem; font-weight: 600; }
        .note-body h3 { font-size: 1.05rem; margin-bottom: 0.4rem; font-weight: 600; }
        .note-body p { margin-bottom: 0.75rem; }
        .note-body ul, .note-body ol { margin-bottom: 0.75rem; padding-left: 1.25rem; }
        .note-body li { margin-bottom: 0.25rem; }
        .note-body blockquote { border-left: 3px solid var(--accent); padding: 0.4rem 0 0.4rem 1rem; margin: 0.75rem 0; color: var(--text-secondary); font-style: italic; background-color: var(--accent-soft); border-radius: 0 6px 6px 0; }
        .note-body code { font-family: 'JetBrains Mono', monospace; background: var(--tag-bg); padding: 0.15em 0.35em; border-radius: 3px; font-size: 0.85em; }
        .note-body pre { background: var(--tag-bg); padding: 12px; border-radius: 6px; overflow-x: auto; margin-bottom: 0.75rem; }
        .note-body pre code { background: none; padding: 0; }
        .note-body strong { font-weight: 600; }
        .note-body em { font-style: italic; }
        .note-body a { color: var(--accent); text-decoration: none; }
        .note-body a:hover { text-decoration: underline; }

        .note-footer {
            margin-top: 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .inline-tag {
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--accent);
            background-color: var(--accent-soft);
            padding: 2px 6px;
            border-radius: 10px;
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state h3 {
            margin-bottom: 6px;
            color: var(--text-primary);
            font-size: 1.1rem;
        }

        .empty-state p {
            font-size: 0.9rem;
        }

        @media (max-width: 850px) {
            body { flex-direction: column; overflow-y: auto; height: auto; }
            aside { width: 100%; height: auto; padding: 16px; }
            main { height: auto; flex: none; }
            .feed-wrap { overflow-y: visible; height: auto; }
            .top-bar, .editor-section, .feed-wrap { padding-left: 16px; padding-right: 16px; }
        }
    </style>
</head>
<body>
    <aside>
        <div class="logo">
            <span>◆</span> SNotes
        </div>

        <div class="calendar-wrap">
            <div class="calendar-header">
                <div class="month-name" id="calendarMonth">Month 2024</div>
                <div class="calendar-nav">
                    <button id="prevBtn">&lsaquo;</button>
                    <button id="nextBtn">&rsaquo;</button>
                </div>
            </div>
            <div class="calendar-grid" id="calendarGrid">
                <div class="calendar-day-label">S</div>
                <div class="calendar-day-label">M</div>
                <div class="calendar-day-label">T</div>
                <div class="calendar-day-label">W</div>
                <div class="calendar-day-label">T</div>
                <div class="calendar-day-label">F</div>
                <div class="calendar-day-label">S</div>
            </div>
        </div>

        <div class="tags-section">
            <div class="sidebar-section-title">Tags</div>
            <div class="tags-container" id="sidebarTags">
                <!-- Tags generated by JS -->
            </div>
        </div>
    </aside>

    <main>
        <div class="top-bar">
            <div id="filterDisplay" class="filter-status" style="display: none;">
                <span id="filterLabel">Filtering</span>
                <span class="clear-btn" id="clearFilterBtn" title="Clear Filter">✕</span>
            </div>
            <div></div>
        </div>

        <section class="editor-section">
            <div class="editor-card">
                <textarea id="editor" placeholder="Type your note... Use #tag or #folder/tag for organization"></textarea>
                <div class="tag-autocomplete" id="tagAutocomplete"></div>
                <div class="editor-footer">
                    <span class="edit-indicator" id="editIndicator" style="display: none;">
                        <span>✎ Editing note</span>
                        <button class="action-btn" id="cancelEditBtn" style="opacity: 1;">Cancel</button>
                    </span>
                    <button class="btn-secondary" id="cancelBtn" style="display: none;">Cancel</button>
                    <button class="btn-primary" id="saveNoteBtn">Create Note</button>
                </div>
            </div>
        </section>

        <section class="feed-wrap">
            <div class="feed-inner" id="notesFeed">
                <!-- Notes generated by JS -->
            </div>
        </section>
    </main>

    <script>
        /**
         * SNotes App Core
         */

        // --- State Management ---
        const state = {
            notes: JSON.parse(localStorage.getItem('snotes_db')) || [],
            filter: {
                date: null,
                tag: null
            },
            viewDate: new Date(),
            editMode: {
                isEditing: false,
                noteId: null
            },
            autocomplete: {
                active: false,
                selectedIndex: 0,
                matches: []
            }
        };

        // --- Config ---
        marked.setOptions({
            breaks: true,
            gfm: true,
            headerIds: false,
            mangle: false
        });

        // --- Utilities ---
        const formatDate = (date) => {
            const d = new Date(date);
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const year = String(d.getFullYear()).slice(-2);
            return `${day}-${month}-${year}`;
        };

        const extractTags = (text) => {
            const matches = text.match(/#([\w/-]+)/g);
            if (!matches) return [];
            return [...new Set(matches.map(m => m.slice(1)))].sort();
        };

        const parseTagHierarchy = (tag) => {
            const parts = tag.split('/');
            return {
                full: tag,
                folder: parts.length > 1 ? parts.slice(0, -1).join('/') : null,
                name: parts[parts.length - 1]
            };
        };

        const getAllTags = () => {
            const allTags = new Set();
            state.notes.forEach(note => {
                note.tags.forEach(tag => allTags.add(tag));
            });
            return [...allTags].sort();
        };

        const getTagTree = () => {
            const tags = getAllTags();
            const tree = {};

            tags.forEach(tag => {
                const parts = tag.split('/');
                let current = tree;

                parts.forEach((part, index) => {
                    if (!current[part]) {
                        current[part] = {
                            _isLeaf: index === parts.length - 1,
                            _fullPath: parts.slice(0, index + 1).join('/'),
                            _children: {}
                        };
                    }
                    current = current[part]._children;
                });
            });

            return tree;
        };

        const saveToLocal = () => {
            localStorage.setItem('snotes_db', JSON.stringify(state.notes));
        };

        // --- DOM Elements ---
        const el = {
            editor: document.getElementById('editor'),
            saveBtn: document.getElementById('saveNoteBtn'),
            cancelBtn: document.getElementById('cancelBtn'),
            editIndicator: document.getElementById('editIndicator'),
            cancelEditBtn: document.getElementById('cancelEditBtn'),
            feed: document.getElementById('notesFeed'),
            calendarGrid: document.getElementById('calendarGrid'),
            calendarMonth: document.getElementById('calendarMonth'),
            sidebarTags: document.getElementById('sidebarTags'),
            prevBtn: document.getElementById('prevBtn'),
            nextBtn: document.getElementById('nextBtn'),
            filterDisplay: document.getElementById('filterDisplay'),
            filterLabel: document.getElementById('filterLabel'),
            clearFilterBtn: document.getElementById('clearFilterBtn'),
            tagAutocomplete: document.getElementById('tagAutocomplete')
        };

        // --- Tag Autocomplete ---
        const showAutocomplete = (query = '') => {
            const allTags = getAllTags();
            const matches = query
                ? allTags.filter(t => t.toLowerCase().includes(query.toLowerCase()))
                : allTags;

            if (matches.length === 0 && query) {
                matches.push(query);
            }

            state.autocomplete.matches = matches;
            state.autocomplete.selectedIndex = 0;

            if (matches.length === 0) {
                hideAutocomplete();
                return;
            }

            el.tagAutocomplete.innerHTML = matches.map((tag, index) => {
                const parsed = parseTagHierarchy(tag);
                const display = parsed.folder
                    ? `<span class="autocomplete-folder">${parsed.folder}/</span><span class="autocomplete-tag">${parsed.name}</span>`
                    : `<span class="autocomplete-tag">${tag}</span>`;
                const isNew = !allTags.includes(tag);
                const newLabel = isNew ? ' <span style="color: var(--text-secondary); font-size: 0.7rem;">(new)</span>' : '';

                return `<div class="autocomplete-item ${index === 0 ? 'selected' : ''}" data-index="${index}">${display}${newLabel}</div>`;
            }).join('');

            el.tagAutocomplete.classList.add('active');
            state.autocomplete.active = true;

            // Position autocomplete below cursor
            const cursorPosition = el.editor.selectionStart;
            const textBeforeCursor = el.editor.value.substring(0, cursorPosition);
            const lines = textBeforeCursor.split('\n');
            const currentLine = lines[lines.length - 1];

            // Simple positioning - you could make this more sophisticated
            el.tagAutocomplete.style.top = 'auto';
            el.tagAutocomplete.style.bottom = '50px';
            el.tagAutocomplete.style.left = '12px';
        };

        const hideAutocomplete = () => {
            el.tagAutocomplete.classList.remove('active');
            state.autocomplete.active = false;
        };

        const selectAutocompleteItem = (index) => {
            const tag = state.autocomplete.matches[index];
            if (!tag) return;

            const cursorPosition = el.editor.selectionStart;
            const textBeforeCursor = el.editor.value.substring(0, cursorPosition);
            const textAfterCursor = el.editor.value.substring(cursorPosition);

            // Find the start of the current #
            const hashIndex = textBeforeCursor.lastIndexOf('#');
            const beforeHash = el.editor.value.substring(0, hashIndex);

            el.editor.value = beforeHash + '#' + tag + ' ' + textAfterCursor;

            // Set cursor position after the inserted tag
            const newCursorPos = hashIndex + tag.length + 2;
            el.editor.setSelectionRange(newCursorPos, newCursorPos);

            hideAutocomplete();
            el.editor.focus();
        };

        // Handle editor input for autocomplete
        el.editor.addEventListener('input', (e) => {
            const cursorPosition = el.editor.selectionStart;
            const textBeforeCursor = el.editor.value.substring(0, cursorPosition);

            // Check if we're typing a tag
            const hashMatch = textBeforeCursor.match(/#([\w/-]*)$/);

            if (hashMatch) {
                const query = hashMatch[1];
                showAutocomplete(query);
            } else {
                hideAutocomplete();
            }
        });

        // Handle keyboard navigation for autocomplete
        el.editor.addEventListener('keydown', (e) => {
            if (!state.autocomplete.active) return;

            if (e.key === 'ArrowDown') {
                e.preventDefault();
                state.autocomplete.selectedIndex = (state.autocomplete.selectedIndex + 1) % state.autocomplete.matches.length;
                updateAutocompleteSelection();
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                state.autocomplete.selectedIndex = (state.autocomplete.selectedIndex - 1 + state.autocomplete.matches.length) % state.autocomplete.matches.length;
                updateAutocompleteSelection();
            } else if (e.key === 'Enter' || e.key === 'Tab') {
                e.preventDefault();
                selectAutocompleteItem(state.autocomplete.selectedIndex);
            } else if (e.key === 'Escape') {
                hideAutocomplete();
            }
        });

        const updateAutocompleteSelection = () => {
            const items = el.tagAutocomplete.querySelectorAll('.autocomplete-item');
            items.forEach((item, index) => {
                item.classList.toggle('selected', index === state.autocomplete.selectedIndex);
            });
        };

        // Click on autocomplete items
        el.tagAutocomplete.addEventListener('click', (e) => {
            const item = e.target.closest('.autocomplete-item');
            if (item) {
                const index = parseInt(item.dataset.index);
                selectAutocompleteItem(index);
            }
        });

        // --- CRUD Operations ---
        const createNote = () => {
            const markdown = el.editor.value.trim();
            if (!markdown) return;

            const now = new Date();
            const dateKey = formatDate(now);
            const html = marked.parse(markdown);
            const tags = extractTags(markdown);

            const note = {
                id: 'n-' + Date.now(),
                markdown: markdown,
                html: html,
                timestamp: now.getTime(),
                dateKey: dateKey,
                tags: tags,
                displayDate: dateKey
            };

            state.notes.unshift(note);
            saveToLocal();

            el.editor.value = '';
            state.filter.date = null;
            state.filter.tag = null;

            renderAll();
            document.querySelector('.feed-wrap').scrollTop = 0;
        };

        const updateNote = () => {
            const markdown = el.editor.value.trim();
            if (!markdown || !state.editMode.isEditing) return;

            const noteIndex = state.notes.findIndex(n => n.id === state.editMode.noteId);
            if (noteIndex === -1) return;

            const note = state.notes[noteIndex];
            note.markdown = markdown;
            note.html = marked.parse(markdown);
            note.tags = extractTags(markdown);

            saveToLocal();
            exitEditMode();
            renderAll();
        };

        const deleteNote = (id, event) => {
            if (event) event.stopPropagation();
            if (!confirm('Are you sure you want to delete this note?')) return;
            state.notes = state.notes.filter(n => n.id !== id);
            saveToLocal();
            if (state.editMode.noteId === id) {
                exitEditMode();
            }
            renderAll();
        };

        const startEditNote = (id) => {
            const note = state.notes.find(n => n.id === id);
            if (!note) return;

            state.editMode.isEditing = true;
            state.editMode.noteId = id;

            el.editor.value = note.markdown;
            el.saveBtn.textContent = 'Update Note';
            el.cancelBtn.style.display = 'block';
            el.editIndicator.style.display = 'flex';

            el.editor.focus();
            document.querySelector('.feed-wrap').scrollTop = 0;
        };

        const exitEditMode = () => {
            state.editMode.isEditing = false;
            state.editMode.noteId = null;

            el.editor.value = '';
            el.saveBtn.textContent = 'Create Note';
            el.cancelBtn.style.display = 'none';
            el.editIndicator.style.display = 'none';
        };

        // --- Rendering Logic ---
        const renderAll = () => {
            renderFeed();
            renderCalendar();
            renderTags();
            updateFilterDisplay();
        };

        const renderFeed = () => {
            let filtered = state.notes;

            if (state.filter.date) {
                filtered = filtered.filter(n => n.dateKey === state.filter.date);
            } else if (state.filter.tag) {
                filtered = filtered.filter(n => n.tags.some(t => {
                    // Match exact tag or tag as part of hierarchy
                    return t === state.filter.tag || t.startsWith(state.filter.tag + '/');
                }));
            }

            if (filtered.length === 0) {
                el.feed.innerHTML = `
                    <div class="empty-state">
                        <h3>No notes found</h3>
                        <p>Try clearing your filters or create a new note.</p>
                    </div>
                `;
                return;
            }

            el.feed.innerHTML = filtered.map(note => `
                <div class="note-item" data-id="${note.id}">
                    <div class="note-meta">
                        <span class="note-date">${note.displayDate}</span>
                        <div class="note-actions">
                            <button class="action-btn" onclick="startEditNote('${note.id}')">Edit</button>
                            <button class="action-btn delete" onclick="deleteNote('${note.id}', event)">Delete</button>
                        </div>
                    </div>
                    <div class="note-body">${note.html}</div>
                    ${note.tags.length ? `
                        <div class="note-footer">
                            ${note.tags.map(t => `<span class="inline-tag">${t}</span>`).join('')}
                        </div>
                    ` : ''}
                </div>
            `).join('');

            // Add click handlers to note items for editing
            el.feed.querySelectorAll('.note-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    // Don't trigger if clicking on action buttons
                    if (e.target.closest('.note-actions')) return;
                    const id = item.dataset.id;
                    startEditNote(id);
                });
            });
        };

        const renderCalendar = () => {
            const grid = el.calendarGrid;
            const labels = Array.from(grid.querySelectorAll('.calendar-day-label'));
            grid.innerHTML = '';
            labels.forEach(l => grid.appendChild(l));

            const year = state.viewDate.getFullYear();
            const month = state.viewDate.getMonth();
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];

            el.calendarMonth.textContent = `${monthNames[month]} ${year}`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = formatDate(new Date());

            const activity = {};
            state.notes.forEach(n => activity[n.dateKey] = (activity[n.dateKey] || 0) + 1);

            for (let i = 0; i < firstDay; i++) {
                const cell = document.createElement('div');
                cell.className = 'day-cell other-month';
                grid.appendChild(cell);
            }

            for (let i = 1; i <= daysInMonth; i++) {
                const cell = document.createElement('div');
                const date = new Date(year, month, i);
                const dKey = formatDate(date);
                const count = activity[dKey] || 0;

                let heat = 'heat-0';
                if (count >= 6) heat = 'heat-3';
                else if (count >= 3) heat = 'heat-2';
                else if (count >= 1) heat = 'heat-1';

                cell.className = `day-cell ${heat} ${state.filter.date === dKey ? 'selected' : ''} ${today === dKey ? 'today' : ''}`;
                cell.textContent = i;

                cell.onclick = () => {
                    state.filter.date = (state.filter.date === dKey) ? null : dKey;
                    state.filter.tag = null;
                    renderAll();
                };

                grid.appendChild(cell);
            }
        };

        const renderTags = () => {
            const tags = getAllTags();

            if (tags.length === 0) {
                el.sidebarTags.innerHTML = '<p style="font-size: 0.75rem; color: var(--text-secondary);">No tags yet.</p>';
                return;
            }

            // Group tags by folder
            const folderGroups = {};
            const rootTags = [];

            tags.forEach(tag => {
                const parsed = parseTagHierarchy(tag);
                if (parsed.folder) {
                    if (!folderGroups[parsed.folder]) {
                        folderGroups[parsed.folder] = [];
                    }
                    folderGroups[parsed.folder].push(tag);
                } else {
                    rootTags.push(tag);
                    // Check if this is also a parent folder
                    const childTags = tags.filter(t => t.startsWith(tag + '/'));
                    if (childTags.length > 0) {
                        folderGroups[tag] = childTags;
                    }
                }
            });

            let html = '';

            // Render root tags that aren't folders
            rootTags.forEach(tag => {
                if (!folderGroups[tag]) {
                    const count = state.notes.filter(n => n.tags.includes(tag)).length;
                    html += `
                        <div class="tag-pill ${state.filter.tag === tag ? 'active' : ''}" onclick="filterByTag('${tag}')">
                            #${tag} <span class="tag-count">${count}</span>
                        </div>
                    `;
                }
            });

            // Render folder groups
            Object.entries(folderGroups).forEach(([folder, folderTags]) => {
                html += `<div class="tag-folder">`;
                html += `<div class="tag-folder-name">${folder}</div>`;
                html += `<div class="tag-folder-children">`;

                folderTags.forEach(tag => {
                    const parsed = parseTagHierarchy(tag);
                    const displayName = parsed.name;
                    const count = state.notes.filter(n => n.tags.includes(tag) || n.tags.some(t => t.startsWith(tag + '/'))).length;

                    html += `
                        <div class="tag-pill ${state.filter.tag === tag ? 'active' : ''}" onclick="filterByTag('${tag}')">
                            ${displayName} <span class="tag-count">${count}</span>
                        </div>
                    `;
                });

                html += `</div></div>`;
            });

            el.sidebarTags.innerHTML = html;
        };

        const filterByTag = (tag) => {
            state.filter.tag = (state.filter.tag === tag) ? null : tag;
            state.filter.date = null;
            renderAll();
        };

        const updateFilterDisplay = () => {
            if (state.filter.date || state.filter.tag) {
                el.filterDisplay.style.display = 'flex';
                el.filterLabel.textContent = state.filter.date ? `Filtered by ${state.filter.date}` : `Filtered by #${state.filter.tag}`;
            } else {
                el.filterDisplay.style.display = 'none';
            }
        };

        // --- Event Listeners ---
        el.saveBtn.onclick = () => {
            if (state.editMode.isEditing) {
                updateNote();
            } else {
                createNote();
            }
        };

        el.cancelBtn.onclick = exitEditMode;
        el.cancelEditBtn.onclick = exitEditMode;

        el.prevBtn.onclick = () => {
            state.viewDate.setMonth(state.viewDate.getMonth() - 1);
            renderCalendar();
        };

        el.nextBtn.onclick = () => {
            state.viewDate.setMonth(state.viewDate.getMonth() + 1);
            renderCalendar();
        };

        el.clearFilterBtn.onclick = () => {
            state.filter.date = null;
            state.filter.tag = null;
            renderAll();
        };

        // --- Initialize ---
        renderAll();
    </script>
</body>
</html>
