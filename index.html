<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SNotes</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <h1>SNotes</h1>
        <button id="newCardBtn" class="primary">+ New Card (N)</button>

        <div class="section">
          <label>Search</label>
          <input id="searchInput" placeholder="Search cards, tags, content..." />
        </div>

        <div class="section">
          <label>Views</label>
          <div class="toggle-list">
            <button class="chip active" data-filter="all">All</button>
            <button class="chip" data-filter="pinned">Pinned</button>
            <button class="chip" data-filter="archived">Archived</button>
            <button class="chip" data-filter="trash">Trash</button>
          </div>
        </div>

        <div class="section">
          <label>Tags</label>
          <div id="tagFilters" class="tag-cloud"></div>
        </div>

        <details class="section" open>
          <summary>Settings</summary>
          <label for="themeSelect">Theme</label>
          <select id="themeSelect">
            <option value="system">System</option>
            <option value="light">Light</option>
            <option value="dark">Dark</option>
          </select>

          <label for="layoutSelect">Feed layout</label>
          <select id="layoutSelect">
            <option value="wide">Wide cards</option>
            <option value="grid">Grid cards</option>
          </select>

          <label for="densitySelect">Density</label>
          <select id="densitySelect">
            <option value="comfortable">Comfortable</option>
            <option value="compact">Compact</option>
          </select>

          <label class="checkbox">
            <input id="previewToggle" type="checkbox" checked />
            Live markdown preview
          </label>
        </details>

        <p class="help">
          Shortcuts: <b>N</b> new, <b>/</b> search, <b>Ctrl/Cmd+S</b> save, <b>Ctrl/Cmd+K</b> command palette.
        </p>
      </aside>

      <main>
        <header class="topbar">
          <h2 id="viewTitle">All Cards</h2>
          <button id="commandBtn" class="secondary">Command Palette</button>
        </header>
        <section id="cardsGrid" class="cards-grid wide"></section>
        <div id="feedStatus" class="feed-status"></div>
        <div id="feedSentinel" class="feed-sentinel"></div>
      </main>
    </div>

    <dialog id="editorDialog">
      <form method="dialog" id="editorForm">
        <header>
          <h3 id="editorTitle">New Card</h3>
          <div class="dialog-actions">
            <button type="button" id="pinBtn" class="ghost">Pin</button>
            <button type="button" id="archiveBtn" class="ghost">Archive</button>
            <button type="button" id="trashBtn" class="ghost danger">Trash</button>
          </div>
        </header>

        <label>Title</label>
        <input id="titleInput" required />

        <label>Tags (comma separated)</label>
        <input id="tagsInput" placeholder="work, project, idea" />

        <label>Card Body (Markdown + [[Backlinks]])</label>
        <textarea id="contentInput" rows="12" required></textarea>

        <section id="previewSection" class="preview-wrap">
          <h4>Live Preview</h4>
          <article id="previewPane" class="preview"></article>
        </section>

        <footer>
          <button type="button" id="deleteBtn" class="danger">Delete Permanently</button>
          <div>
            <button type="button" id="cancelBtn" class="secondary">Cancel</button>
            <button type="submit" class="primary">Save</button>
          </div>
        </footer>
      </form>
    </dialog>

    <dialog id="commandDialog">
      <form method="dialog" id="commandForm">
        <h3>Command Palette</h3>
        <input id="commandSearch" placeholder="Type a command..." autofocus />
        <ul id="commandList"></ul>
      </form>
    </dialog>

    <template id="cardTemplate">
      <article class="card">
        <div class="card-top">
          <h3></h3>
          <div class="status-icons"></div>
        </div>
        <p class="excerpt"></p>
        <div class="meta">
          <div class="tags"></div>
          <small class="updated"></small>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
