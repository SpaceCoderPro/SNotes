<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNotes — Minimalist Feed Notes</title>
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked@4.3.0/marked.min.js"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f9fafb;
            --sidebar-bg: #ffffff;
            --text-primary: #111827;
            --text-secondary: #6b7280;
            --accent: #10b981;
            --accent-hover: #059669;
            --accent-soft: #ecfdf5;
            --border: #e5e7eb;
            --card-bg: #ffffff;
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            --heat-0: #f3f4f6;
            --heat-1: #d1fae5;
            --heat-2: #6ee7b7;
            --heat-3: #10b981;
            --tag-bg: #f3f4f6;
            --tag-text: #4b5563;
            --selection: #d1fae5;
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            --bg-color: #111827;
            --sidebar-bg: #1f2937;
            --text-primary: #f9fafb;
            --text-secondary: #9ca3af;
            --accent: #10b981;
            --accent-hover: #34d399;
            --accent-soft: rgba(16, 185, 129, 0.1);
            --border: #374151;
            --card-bg: #1f2937;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
            --heat-0: #374151;
            --heat-1: #064e3b;
            --heat-2: #059669;
            --heat-3: #10b981;
            --tag-bg: #374151;
            --tag-text: #d1d5db;
            --selection: #064e3b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s, color 0.3s;
        }

        /* Sidebar */
        aside {
            width: 320px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 32px 24px;
            overflow-y: auto;
            z-index: 10;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 40px;
            display: flex;
            align-items: center;
            gap: 12px;
            letter-spacing: -0.025em;
        }

        .logo span {
            color: var(--accent);
        }

        /* Calendar Activity Heatmap */
        .calendar-wrap {
            margin-bottom: 40px;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .month-name {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .calendar-nav {
            display: flex;
            gap: 4px;
        }

        .calendar-nav button {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 1.1rem;
            transition: var(--transition);
        }

        .calendar-nav button:hover {
            background-color: var(--tag-bg);
            color: var(--text-primary);
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }

        .calendar-day-label {
            font-size: 0.7rem;
            text-align: center;
            color: var(--text-secondary);
            font-weight: 600;
            padding-bottom: 8px;
            text-transform: uppercase;
        }

        .day-cell {
            aspect-ratio: 1;
            border-radius: 4px;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: var(--transition);
            font-weight: 500;
        }

        .day-cell:hover:not(.other-month) {
            transform: scale(1.1);
            z-index: 1;
        }

        .day-cell.selected {
            box-shadow: 0 0 0 2px var(--accent);
        }

        .day-cell.other-month {
            opacity: 0.15;
            cursor: default;
        }

        .day-cell.today {
            text-decoration: underline;
            font-weight: 700;
        }

        .heat-0 { background-color: var(--heat-0); color: var(--text-secondary); }
        .heat-1 { background-color: var(--heat-1); color: var(--text-primary); }
        .heat-2 { background-color: var(--heat-2); color: #fff; }
        .heat-3 { background-color: var(--heat-3); color: #fff; }

        /* Tags List */
        .sidebar-section-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 16px;
        }

        .tags-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            flex: 1;
        }

        .tag-pill {
            font-size: 0.8125rem;
            padding: 6px 12px;
            border-radius: 9999px;
            background-color: var(--tag-bg);
            color: var(--tag-text);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid transparent;
        }

        .tag-pill:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .tag-pill.active {
            background-color: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .tag-count {
            font-size: 0.7rem;
            opacity: 0.7;
        }

        /* Theme Toggle & Footer */
        .sidebar-footer {
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .theme-label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .toggle-switch {
            width: 44px;
            height: 22px;
            background-color: var(--tag-bg);
            border-radius: 9999px;
            position: relative;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid var(--border);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            left: 2px;
            top: 2px;
            width: 16px;
            height: 16px;
            background-color: white;
            border-radius: 50%;
            transition: var(--transition);
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        [data-theme="dark"] .toggle-switch {
            background-color: var(--accent);
        }

        [data-theme="dark"] .toggle-switch::after {
            left: 24px;
            background-color: #f9fafb;
        }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-color: var(--bg-color);
        }

        .top-bar {
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .filter-status {
            font-size: 0.875rem;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            background: var(--accent-soft);
            padding: 6px 14px;
            border-radius: 8px;
            color: var(--accent);
            font-weight: 500;
        }

        .clear-btn {
            cursor: pointer;
            font-weight: 700;
            margin-left: 4px;
        }

        /* Editor Section */
        .editor-section {
            padding: 0 40px 24px;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
        }

        .editor-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            padding: 24px;
            transition: var(--transition);
        }

        #editor {
            min-height: 120px;
            outline: none;
            font-size: 1.05rem;
            line-height: 1.6;
            color: var(--text-primary);
        }

        #editor:empty::before {
            content: attr(placeholder);
            color: var(--text-secondary);
            opacity: 0.6;
        }

        .editor-footer {
            display: flex;
            justify-content: flex-end;
            margin-top: 16px;
        }

        .btn-primary {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
        }

        .btn-primary:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        /* Feed Section */
        .feed-wrap {
            flex: 1;
            overflow-y: auto;
            padding: 0 40px 60px;
            scroll-behavior: smooth;
        }

        .feed-inner {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
        }

        .note-item {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            position: relative;
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .note-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .note-date {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            background-color: var(--tag-bg);
            padding: 4px 10px;
            border-radius: 6px;
        }

        .note-actions {
            opacity: 0;
            transition: var(--transition);
        }

        .note-item:hover .note-actions {
            opacity: 1;
        }

        .action-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 4px;
            font-size: 0.9rem;
        }

        .action-btn:hover {
            color: #ef4444;
        }

        .note-body {
            line-height: 1.75;
            color: var(--text-primary);
        }

        /* Markdown in Body */
        .note-body h1, #editor h1 { font-size: 1.75rem; margin-bottom: 1rem; font-weight: 700; letter-spacing: -0.02em; }
        .note-body h2, #editor h2 { font-size: 1.5rem; margin-bottom: 0.75rem; font-weight: 600; }
        .note-body h3, #editor h3 { font-size: 1.25rem; margin-bottom: 0.5rem; font-weight: 600; }
        .note-body p, #editor p { margin-bottom: 1.25rem; }
        .note-body ul, .note-body ol, #editor ul, #editor ol { margin-bottom: 1.25rem; padding-left: 1.5rem; }
        .note-body blockquote, #editor blockquote { border-left: 4px solid var(--accent); padding: 0.5rem 0 0.5rem 1.5rem; margin: 1.5rem 0; color: var(--text-secondary); font-style: italic; background-color: var(--accent-soft); border-radius: 0 8px 8px 0; }
        .note-body code, #editor code { font-family: 'JetBrains Mono', monospace; background: var(--tag-bg); padding: 0.2em 0.4em; border-radius: 4px; font-size: 0.9em; }

        .note-footer {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .inline-tag {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--accent);
        }

        /* Scrollbar Styling */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 100px 20px;
            color: var(--text-secondary);
        }

        .empty-state h3 {
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        @media (max-width: 850px) {
            body { flex-direction: column; overflow-y: auto; height: auto; }
            aside { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border); padding: 24px; }
            main { height: auto; flex: none; }
            .feed-wrap { overflow-y: visible; height: auto; }
            .top-bar, .editor-section, .feed-wrap { padding-left: 20px; padding-right: 20px; }
        }
    </style>
</head>
<body data-theme="light">
    <aside>
        <div class="logo">
            <span>◆</span> SNotes
        </div>

        <div class="calendar-wrap">
            <div class="calendar-header">
                <div class="month-name" id="calendarMonth">Month 2024</div>
                <div class="calendar-nav">
                    <button id="prevBtn">&lsaquo;</button>
                    <button id="nextBtn">&rsaquo;</button>
                </div>
            </div>
            <div class="calendar-grid" id="calendarGrid">
                <!-- Day labels -->
                <div class="calendar-day-label">S</div>
                <div class="calendar-day-label">M</div>
                <div class="calendar-day-label">T</div>
                <div class="calendar-day-label">W</div>
                <div class="calendar-day-label">T</div>
                <div class="calendar-day-label">F</div>
                <div class="calendar-day-label">S</div>
                <!-- Grid content generated by JS -->
            </div>
        </div>

        <div class="sidebar-section-title">Tags</div>
        <div class="tags-container" id="sidebarTags">
            <!-- Tags generated by JS -->
        </div>

        <div class="sidebar-footer">
            <span class="theme-label">Theme</span>
            <div class="toggle-switch" id="themeToggle" title="Toggle Light/Dark Theme"></div>
        </div>
    </aside>

    <main>
        <div class="top-bar">
            <div id="filterDisplay" class="filter-status" style="display: none;">
                <span id="filterLabel">Filtering</span>
                <span class="clear-btn" id="clearFilterBtn" title="Clear Filter">✕</span>
            </div>
            <div></div> <!-- Spacer -->
        </div>

        <section class="editor-section">
            <div class="editor-card">
                <div id="editor" contenteditable="true" placeholder="Type your note... # Header, **Bold**, - List, `Code`" tabindex="1"></div>
                <div class="editor-footer">
                    <button class="btn-primary" id="saveNoteBtn">Create Note</button>
                </div>
            </div>
        </section>

        <section class="feed-wrap">
            <div class="feed-inner" id="notesFeed">
                <!-- Notes generated by JS -->
            </div>
        </section>
    </main>

    <script>
        /**
         * SNotes App Core
         */

        // --- State Management ---
        const state = {
            notes: JSON.parse(localStorage.getItem('snotes_db')) || [],
            theme: localStorage.getItem('snotes_theme') || 'light',
            filter: {
                date: null, // dd-mm-yy
                tag: null
            },
            viewDate: new Date() // For calendar navigation
        };

        // --- Config ---
        marked.setOptions({
            breaks: true,
            gfm: true,
            headerIds: false,
            mangle: false
        });

        // --- Utilities ---
        const formatDate = (date) => {
            const d = new Date(date);
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const year = String(d.getFullYear()).slice(-2);
            return `${day}-${month}-${year}`;
        };

        const extractTags = (text) => {
            // Get text without HTML tags for regex matching
            const temp = document.createElement('div');
            temp.innerHTML = text;
            const plain = temp.innerText;
            const matches = plain.match(/#([\w-]+)/g);
            if (!matches) return [];
            return [...new Set(matches.map(m => m.slice(1)))];
        };

        const saveToLocal = () => {
            localStorage.setItem('snotes_db', JSON.stringify(state.notes));
            localStorage.setItem('snotes_theme', state.theme);
        };

        // --- DOM Elements ---
        const el = {
            body: document.body,
            editor: document.getElementById('editor'),
            saveBtn: document.getElementById('saveNoteBtn'),
            feed: document.getElementById('notesFeed'),
            calendarGrid: document.getElementById('calendarGrid'),
            calendarMonth: document.getElementById('calendarMonth'),
            sidebarTags: document.getElementById('sidebarTags'),
            themeToggle: document.getElementById('themeToggle'),
            prevBtn: document.getElementById('prevBtn'),
            nextBtn: document.getElementById('nextBtn'),
            filterDisplay: document.getElementById('filterDisplay'),
            filterLabel: document.getElementById('filterLabel'),
            clearFilterBtn: document.getElementById('clearFilterBtn')
        };

        // --- Live Markdown Editor Logic ---
        function getCaretOffset(element) {
            const selection = window.getSelection();
            if (selection.rangeCount === 0) return 0;
            const range = selection.getRangeAt(0);
            const preCaretRange = range.cloneRange();
            preCaretRange.selectNodeContents(element);
            preCaretRange.setEnd(range.endContainer, range.endOffset);
            return preCaretRange.toString().length;
        }

        function setCaretOffset(element, offset) {
            let currentOffset = 0;
            const stack = [element];
            while (stack.length > 0) {
                const node = stack.pop();
                if (node.nodeType === 3) {
                    const nextOffset = currentOffset + node.length;
                    if (offset <= nextOffset) {
                        const range = document.createRange();
                        const sel = window.getSelection();
                        range.setStart(node, offset - currentOffset);
                        range.collapse(true);
                        sel.removeAllRanges();
                        sel.addRange(range);
                        return;
                    }
                    currentOffset = nextOffset;
                } else {
                    for (let i = node.childNodes.length - 1; i >= 0; i--) {
                        stack.push(node.childNodes[i]);
                    }
                }
            }
            // End of content fallback
            const range = document.createRange();
            const sel = window.getSelection();
            range.selectNodeContents(element);
            range.collapse(false);
            sel.removeAllRanges();
            sel.addRange(range);
        }

        const handleEditorInput = (e) => {
            // Trigger transformation on space or enter
            if (e.inputType === 'insertText' && (e.data === ' ' || e.data === null)) {
                applyLiveMarkdown();
            } else if (e.inputType === 'insertParagraph') {
                applyLiveMarkdown();
            }
        };

        const applyLiveMarkdown = () => {
            const offset = getCaretOffset(el.editor);
            const raw = el.editor.innerText;
            
            // Simple check to avoid unnecessary re-renders
            if (!/[#\*`\->]/.test(raw)) return;

            const html = marked.parse(raw);
            if (el.editor.innerHTML !== html) {
                el.editor.innerHTML = html;
                // Attempt to restore caret - might be slightly off due to tag additions
                // but usually works well for plain text offsets
                setCaretOffset(el.editor, offset);
            }
        };

        el.editor.addEventListener('input', handleEditorInput);
        
        // Handle Enter key for transformation immediately
        el.editor.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                setTimeout(applyLiveMarkdown, 0);
            }
        });

        // --- CRUD Operations ---
        const createNote = () => {
            const content = el.editor.innerHTML.trim();
            const textOnly = el.editor.innerText.trim();
            
            if (!textOnly) return;

            const now = new Date();
            const dateKey = formatDate(now);
            
            const note = {
                id: 'n-' + Date.now(),
                content: content,
                timestamp: now.getTime(),
                dateKey: dateKey,
                tags: extractTags(content),
                displayDate: dateKey
            };

            state.notes.unshift(note);
            saveToLocal();
            
            // UI Reset
            el.editor.innerHTML = '';
            state.filter.date = null;
            state.filter.tag = null;
            
            renderAll();
            
            // Scroll to top of feed
            document.querySelector('.feed-wrap').scrollTop = 0;
        };

        const deleteNote = (id) => {
            if (!confirm('Are you sure you want to delete this note?')) return;
            state.notes = state.notes.filter(n => n.id !== id);
            saveToLocal();
            renderAll();
        };

        // --- Rendering Logic ---
        const renderAll = () => {
            renderFeed();
            renderCalendar();
            renderTags();
            updateFilterDisplay();
            el.body.setAttribute('data-theme', state.theme);
        };

        const renderFeed = () => {
            let filtered = state.notes;
            
            if (state.filter.date) {
                filtered = filtered.filter(n => n.dateKey === state.filter.date);
            } else if (state.filter.tag) {
                filtered = filtered.filter(n => n.tags.includes(state.filter.tag));
            }

            if (filtered.length === 0) {
                el.feed.innerHTML = `
                    <div class="empty-state">
                        <h3>No notes found</h3>
                        <p>Try clearing your filters or create a new note.</p>
                    </div>
                `;
                return;
            }

            el.feed.innerHTML = filtered.map(note => `
                <div class="note-item" data-id="${note.id}">
                    <div class="note-meta">
                        <span class="note-date">${note.displayDate}</span>
                        <div class="note-actions">
                            <button class="action-btn" onclick="deleteNote('${note.id}')">Delete</button>
                        </div>
                    </div>
                    <div class="note-body">${note.content}</div>
                    ${note.tags.length ? `
                        <div class="note-footer">
                            ${note.tags.map(t => `<span class="inline-tag">#${t}</span>`).join('')}
                        </div>
                    ` : ''}
                </div>
            `).join('');
        };

        const renderCalendar = () => {
            const grid = el.calendarGrid;
            // Clear existing cells (preserve labels)
            const labels = Array.from(grid.querySelectorAll('.calendar-day-label'));
            grid.innerHTML = '';
            labels.forEach(l => grid.appendChild(l));

            const year = state.viewDate.getFullYear();
            const month = state.viewDate.getMonth();
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            
            el.calendarMonth.textContent = `${monthNames[month]} ${year}`;

            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const today = formatDate(new Date());

            // Activity data
            const activity = {};
            state.notes.forEach(n => activity[n.dateKey] = (activity[n.dateKey] || 0) + 1);

            // Padding
            for (let i = 0; i < firstDay; i++) {
                const cell = document.createElement('div');
                cell.className = 'day-cell other-month';
                grid.appendChild(cell);
            }

            // Days
            for (let i = 1; i <= daysInMonth; i++) {
                const cell = document.createElement('div');
                const date = new Date(year, month, i);
                const dKey = formatDate(date);
                const count = activity[dKey] || 0;
                
                let heat = 'heat-0';
                if (count >= 6) heat = 'heat-3';
                else if (count >= 3) heat = 'heat-2';
                else if (count >= 1) heat = 'heat-1';

                cell.className = `day-cell ${heat} ${state.filter.date === dKey ? 'selected' : ''} ${today === dKey ? 'today' : ''}`;
                cell.textContent = i;
                
                cell.onclick = () => {
                    state.filter.date = (state.filter.date === dKey) ? null : dKey;
                    state.filter.tag = null;
                    renderAll();
                };
                
                grid.appendChild(cell);
            }
        };

        const renderTags = () => {
            const counts = {};
            state.notes.forEach(n => {
                n.tags.forEach(t => counts[t] = (counts[t] || 0) + 1);
            });

            const sorted = Object.keys(counts).sort();
            
            if (sorted.length === 0) {
                el.sidebarTags.innerHTML = '<p style="font-size: 0.8rem; color: var(--text-secondary);">No tags used yet.</p>';
                return;
            }

            el.sidebarTags.innerHTML = sorted.map(tag => `
                <div class="tag-pill ${state.filter.tag === tag ? 'active' : ''}" onclick="filterByTag('${tag}')">
                    #${tag} <span class="tag-count">${counts[tag]}</span>
                </div>
            `).join('');
        };

        const filterByTag = (tag) => {
            state.filter.tag = (state.filter.tag === tag) ? null : tag;
            state.filter.date = null;
            renderAll();
        };

        const updateFilterDisplay = () => {
            if (state.filter.date || state.filter.tag) {
                el.filterDisplay.style.display = 'flex';
                el.filterLabel.textContent = state.filter.date ? `Filtered by ${state.filter.date}` : `Filtered by #${state.filter.tag}`;
            } else {
                el.filterDisplay.style.display = 'none';
            }
        };

        // --- Event Listeners ---
        el.saveBtn.onclick = createNote;

        el.themeToggle.onclick = () => {
            state.theme = state.theme === 'light' ? 'dark' : 'light';
            saveToLocal();
            renderAll();
        };

        el.prevBtn.onclick = () => {
            state.viewDate.setMonth(state.viewDate.getMonth() - 1);
            renderCalendar();
        };

        el.nextBtn.onclick = () => {
            state.viewDate.setMonth(state.viewDate.getMonth() + 1);
            renderCalendar();
        };

        el.clearFilterBtn.onclick = () => {
            state.filter.date = null;
            state.filter.tag = null;
            renderAll();
        };

        // --- Initialize ---
        renderAll();

    </script>
</body>
</html>
